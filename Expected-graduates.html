        // ==========================================
        // منطق التطبيق (Application Logic)
        // ==========================================

        // دالة لتحويل نص CSV إلى مصفوفة كائنات (Array of Objects)
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',');
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].trim();
                if (!currentLine) continue; // تخطي الأسطر الفارغة
                
                const values = currentLine.split(',');
                const student = {};
                
                headers.forEach((header, index) => {
                    student[header.trim()] = values[index] ? values[index].trim() : '';
                });
                data.push(student);
            }
            return data;
        }

        // تهيئة قاعدة البيانات المحلية
        const studentsDatabase = parseCSV(rawCSV);

        // تفعيل البحث عند الضغط على زر Enter
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { // يمنع البحث عند ضغط Shift+Enter للسماح بسطر جديد
                e.preventDefault();
                searchStudent();
            }
        });

        // دالة البحث الرئيسية
        function searchStudent() {
            const rawQuery = document.getElementById('searchInput').value.trim();
            const resultsArea = document.getElementById('resultsArea');
            resultsArea.classList.remove('hidden');

            // تنظيف المدخلات والتحقق منها
            if (rawQuery === "") {
                resultsArea.innerHTML = `
                    <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-lg flex items-center gap-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <span>الرجاء إدخال بيانات للبحث.</span>
                    </div>`;
                return;
            }

            // تقسيم المدخلات بناءً على الأسطر الجديدة أو الفواصل
            const queries = rawQuery.split(/[\n,]+/).map(q => q.trim()).filter(q => q !== "");

            // البحث وتتبع النتائج للعثور على المفقودين
            const foundQueries = new Set();
            const searchResults = studentsDatabase.filter(student => {
                let isMatch = false;
                queries.forEach(query => {
                    const idMatch = student['الرقم الجامعي'] === query;
                    const nameMatch = student['اسم الطالب'] && student['اسم الطالب'].includes(query);
                    if (idMatch || nameMatch) {
                        isMatch = true;
                        foundQueries.add(query); // تسجيل المدخل الذي تم العثور عليه
                    }
                });
                return isMatch;
            });

            // استخراج المدخلات التي لم يتم العثور عليها
            const missingQueries = queries.filter(q => !foundQueries.has(q));

            renderResults(searchResults, missingQueries);
        }

        // دالة عرض النتائج
        function renderResults(results, missingQueries) {
            const resultsArea = document.getElementById('resultsArea');
            let htmlContent = "";

            // 1. عرض الأرقام/الأسماء التي لم يتم العثور عليها
            if (missingQueries && missingQueries.length > 0) {
                htmlContent += `
                    <div class="bg-red-50 border-r-4 border-red-500 p-5 mb-5 rounded-lg shadow-sm">
                        <h3 class="font-bold text-red-700 mb-2">غير متوقع تخرجهم (أو مدخلات غير صحيحة):</h3>
                        <div class="flex flex-wrap gap-2">
                            ${missingQueries.map(q => `<span class="bg-white text-red-700 border border-red-200 px-3 py-1.5 rounded-md text-sm font-bold shadow-sm">${q}</span>`).join('')}
                        </div>
                    </div>`;
            }
            
            // إن لم يكن هناك أي نتائج صحيحة
            if (results.length === 0) {
                if(missingQueries.length === 0) {
                     resultsArea.innerHTML = `<div class="text-center text-gray-500 p-4">لا توجد بيانات للعرض.</div>`;
                } else {
                     resultsArea.innerHTML = htmlContent;
                }
                return;
            }

            // 2. عرض النتائج الصحيحة
            htmlContent += `<div class="space-y-4">`;
            
            results.forEach(student => {
                htmlContent += `
                    <div class="border border-gray-200 rounded-lg p-5 hover:shadow-md transition-shadow bg-blue-50/30">
                        <div class="flex justify-between items-start border-b border-gray-200 pb-3 mb-3">
                            <div>
                                <h3 class="font-bold text-lg text-blue-900">${student['اسم الطالب']}</h3>
                                <span class="text-sm text-gray-500">الرقم الجامعي: <span class="font-semibold text-gray-800">${student['الرقم الجامعي']}</span></span>
                            </div>
                            <span class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded border border-green-200">
                                متوقع تخرجه
                            </span>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                            <div>
                                <p class="text-gray-500 text-xs">الكلية</p>
                                <p class="font-semibold text-gray-800 truncate" title="${student['الكلية']}">${student['الكلية']}</p>
                            </div>
                            <div>
                                <p class="text-gray-500 text-xs">التخصص</p>
                                <p class="font-semibold text-gray-800">${student['التخصص']}</p>
                            </div>
                        </div>
                    </div>`;
            });

            htmlContent += `</div>`;
            
            // إضافة الملخص العددي
            htmlContent = `<div class="flex items-center gap-2 mb-4">
                              <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-bold">المتوقع تخرجهم: ${results.length}</span>
                           </div>` + htmlContent;

            resultsArea.innerHTML = htmlContent;
        }
    </script>
